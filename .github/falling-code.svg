<svg xmlns="http://w3.org" viewBox="0 0 800 400" width="100%" height="100%" style="background:#0d1117;">
  <style>
    @keyframes fall {
      0% { transform: translateY(-100px); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(400px); opacity: 0; }
    }
    .code-text {
      font-family: 'Courier New', Courier, monospace;
      font-size: 16px;
      fill: #00ff66;
      font-weight: bold;
      animation: fall 4s linear infinite;
    }
    .col1 { animation-delay: 0s; }
    .col2 { animation-delay: 1.5s; }
    .col3 { animation-delay: 0.8s; }
    .col4 { animation-delay: 2.3s; }
  </style>
  
  <text x="50" y="0" class="code-text col1">0 1 0 1 1 0</text>
  <text x="150" y="0" class="code-text col3">1 1 0 0 1 0</text>
  <text x="250" y="0" class="code-text col2">get_data()</text>
  <text x="350" y="0" class="code-text col4">0 1 1 1 0 1</text>
  <text x="450" y="0" class="code-text col1">system.init</text>
  <text x="550" y="0" class="code-text col3">1 0 1 0 1 1</text>
</svg>
